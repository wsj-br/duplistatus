packages:
  - .
  - documentation

# Use a hoisted (non-symlinked) node_modules layout.
#
# Required for Next.js `output: 'standalone'` builds: with pnpm's default
# symlinked layout, file tracing fails to copy transitive runtime deps such as
# `@swc/helpers` into `.next/standalone/node_modules`, causing the container to
# crash at startup with:
#   Cannot find module '.../@swc/helpers/esm/_interop_require_default.js'
# See vercel/next.js#48017, #65636, #50072.
nodeLinker: hoisted

overrides:
  express: 5.2.1
  qs: '>=6.14.1'
  preact: '>=10.28.2'
  lodash: '>=4.17.23'
  lodash-es: '>=4.17.23'
  '@isaacs/brace-expansion': '>=5.0.1'
  minimatch: '>=3.1.4'
  serialize-javascript: '>=7.0.5'
  'svgo@>=3.0.0 <3.3.3': '>=3.3.3'
  'flatted@<3.4.0': '>=3.4.0'
  'undici@>=7.0.0 <7.24.0': '>=7.24.0'
  'undici@>=7.17.0 <7.24.0': '>=7.24.0'
  'flatted@<=3.4.1': '>=3.4.2'
  'dompurify@<3.3.2': '>=3.3.2'
  'brace-expansion@>=4.0.0 <5.0.5': '>=5.0.5'
  'picomatch@<2.3.2': '>=2.3.2'
  'picomatch@>=4.0.0 <4.0.4': '>=4.0.4'
  'dompurify@>=3.1.3 <=3.3.1': '>=3.3.2'
  'lodash-es@>=4.0.0 <=4.17.23': '>=4.18.0'
  'lodash@>=4.0.0 <=4.17.23': '>=4.18.0'
  'lodash-es@<=4.17.23': '>=4.18.0'
  'lodash@<=4.17.23': '>=4.18.0'
  'dompurify@<=3.3.1': '>=3.3.2'
  'nodemailer@<=8.0.4': '>=8.0.5'
  'next@>=16.0.0-beta.0 <16.2.3': '>=16.2.3'
  'basic-ftp@<=5.2.1': '>=5.2.2'
  'basic-ftp@=5.2.0': '>=5.2.1'
  'follow-redirects@<=1.15.11': '>=1.16.0'
  'dompurify@<=3.3.3': '>=3.4.0'
  'basic-ftp@<=5.2.2': '>=5.3.0'
  'uuid@<14.0.0': '>=14.0.0'
  'postcss@<8.5.10': '>=8.5.10'
  'basic-ftp@<=5.3.0': '>=5.3.1'
  'ip-address@<=10.1.0': '>=10.1.1'
  '@swc/helpers@<0.5.17': '>=0.5.17'
  'mermaid@>=11.0.0-alpha.1 <=11.14.0': '>=11.14.1'
  copy-webpack-plugin: '>=14.0.0'
  css-minimizer-webpack-plugin: '>=8.0.0'
  http-proxy-middleware@>=0.16.0 <3.0.6: ^3.0.6
  js-yaml@<=4.1.1: ^4.1.2

peerDependencyRules:
  allowedVersions:
    webpack: '5'

allowedDeprecatedVersions:
  prebuild-install: 7.1.3
  whatwg-encoding: 3.1.1

allowBuilds:
  '@swc/core': true
  '@tailwindcss/oxide': true
  bcrypt: true
  better-sqlite3: true
  core-js: true
  core-js-pure: true
  esbuild: true
  playwright: true
  puppeteer: set this to true or false
  sharp: true
  unrs-resolver: true

minimumReleaseAgeExclude:
  - lucide-react@1.21.0
  - node-cron@4.4.1
  - js-yaml@4.1.2
  - http-proxy-middleware@3.0.6
  - ai-i18n-tools@1.7.1
